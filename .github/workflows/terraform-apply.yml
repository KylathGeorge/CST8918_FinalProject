name: Terraform Apply

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  terraform-apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init (test)
        run: terraform -chdir=terraform/environments/test init

      - name: Terraform Apply (test)
        run: terraform -chdir=terraform/environments/test apply -auto-approve

      - name: Terraform Init (prod)
        run: terraform -chdir=terraform/environments/prod init

      - name: Terraform Apply (prod)
        run: terraform -chdir=terraform/environments/prod apply -auto-approve
