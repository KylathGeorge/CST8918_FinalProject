name: Terraform Plan

on:
  pull_request:
    branches:
      - main

jobs:
  terraform-plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform -chdir=terraform/environments/test init

      - name: Terraform Validate
        run: terraform -chdir=terraform/environments/test validate

      - name: Terraform Plan
        run: terraform -chdir=terraform/environments/test plan