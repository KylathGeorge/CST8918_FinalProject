name: Terraform Plan
on:
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  terraform-plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform -chdir=terraform/environments/test init

      - name: Terraform Validate
        run: terraform -chdir=terraform/environments/test validate

      - name: Terraform Plan
        run: terraform -chdir=terraform/environments/test plan
        env:
          TF_VAR_weather_api_key: ${{ secrets.TF_VAR_weather_api_key }}
